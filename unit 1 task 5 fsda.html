<!DOCTYPE html>
<html>
<head>
  <title>Simple E-Commerce</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    .product {
      border: 1px solid #ccc;
      padding: 20px;
      width: 250px;
      margin: auto;
      border-radius: 10px;
    }
    button {
      padding: 8px 15px;
      background-color: blue;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: darkblue;
    }
  </style>
</head>
<body>

  <h2>Products</h2>

  <div class="product">
    <h3>Smart Watch</h3>
    <p>Price: ₹500</p>
    <button onclick="addCart()">Add to Cart</button>
  </div>

  <h3 id="total">Total: ₹0</h3>

  <script>
    let total = 0;

    function addCart() {
      total += 500;
      document.getElementById("total").innerText = "Total: ₹" + total;
    }
  </script>

</body>
</html>
